<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <title>Goal24MM - Best & Trusted Agent Site</title>
        

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics script - only loaded if env variables are defined -->
    <script>
      if (typeof %VITE_ANALYTICS_ENDPOINT% !== 'undefined' && typeof %VITE_ANALYTICS_WEBSITE_ID% !== 'undefined') {
        const script = document.createElement('script');
        script.defer = true;
        script.src = '%VITE_ANALYTICS_ENDPOINT%/umami';
        script.setAttribute('data-website-id', '%VITE_ANALYTICS_WEBSITE_ID%');
        document.body.appendChild(script);
      }
    </script>
  </body>

</html>
